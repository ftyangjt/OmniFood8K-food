<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>膳食均衡管理平台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            --bg: #f3f6f7;
            --surface: #ffffff;
            --soft: #f8fafb;
            --text: #182230;
            --muted: #667085;
            --line: #d7dde5;
            --accent: #0f766e;
            --accent-soft: #e6f5f2;
            --blue: #2563eb;
            --blue-soft: #eaf1ff;
            --amber: #d97706;
            --amber-soft: #fff4df;
            --rose: #be123c;
            --rose-soft: #fff1f3;
            --green: #15803d;
            --green-soft: #ecfdf3;
            --shadow: 0 16px 42px rgba(24, 34, 48, 0.11);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        button,
        input {
            font: inherit;
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: 68px 1fr;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 0 30px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid var(--line);
        }

        .brand {
            display: grid;
            gap: 2px;
        }

        .brand strong {
            font-size: 18px;
            letter-spacing: 0;
        }

        .brand span,
        .status {
            color: var(--muted);
            font-size: 13px;
        }

        .layout {
            width: min(1440px, calc(100% - 36px));
            margin: 24px auto;
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-head {
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 15px 18px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            margin: 0;
            font-size: 16px;
            letter-spacing: 0;
        }

        .panel-subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .panel-body {
            padding: 18px;
        }

        .segmented {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .segment {
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
        }

        .segment.active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .field input {
            width: 100%;
            min-height: 40px;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
        }

        .button {
            min-height: 42px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .button.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .button.warning {
            border-color: var(--amber);
            color: var(--amber);
            background: var(--amber-soft);
        }

        .button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .full {
            width: 100%;
        }

        .plan-box {
            display: grid;
            gap: 10px;
        }

        .plan-note {
            min-height: 150px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
            white-space: pre-line;
            color: var(--text);
            line-height: 1.58;
            font-size: 14px;
        }

        .muted {
            color: var(--muted);
        }

        .dashboard {
            display: grid;
            gap: 18px;
        }

        .target-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(150px, 1fr));
            gap: 12px;
        }

        .target {
            min-height: 116px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            display: grid;
            align-content: space-between;
            gap: 12px;
        }

        .target-label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .target-value {
            font-size: 26px;
            line-height: 1;
            font-weight: 800;
        }

        .target-unit {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            margin-left: 4px;
        }

        .progress {
            height: 9px;
            border-radius: 999px;
            background: #edf1f5;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 220ms ease;
        }

        .progress-fill.ok {
            background: var(--accent);
        }

        .progress-fill.low {
            background: var(--blue);
        }

        .progress-fill.over {
            background: var(--rose);
        }

        .main-grid {
            display: grid;
            grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
            gap: 18px;
        }

        .dropzone {
            min-height: 300px;
            border: 1px dashed #aab7c4;
            border-radius: 8px;
            background: var(--soft);
            display: grid;
            place-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .dropzone.has-image {
            border-style: solid;
            background: #111827;
        }

        .preview {
            width: 100%;
            height: 100%;
            min-height: 300px;
            object-fit: contain;
        }

        .placeholder {
            color: var(--muted);
            text-align: center;
            padding: 24px;
        }

        .placeholder strong {
            display: block;
            color: var(--text);
            font-size: 17px;
            margin-bottom: 8px;
        }

        .hidden-input {
            display: none;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 14px;
        }

        .mini {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 10px;
        }

        .mini span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .mini strong {
            font-size: 20px;
        }

        .analysis-list {
            display: grid;
            gap: 10px;
        }

        .analysis-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: #fff;
        }

        .analysis-card.need {
            background: var(--blue-soft);
            border-color: #c9d8ff;
        }

        .analysis-card.over {
            background: var(--rose-soft);
            border-color: #ffd0da;
        }

        .analysis-card.ok {
            background: var(--green-soft);
            border-color: #c5efd4;
        }

        .analysis-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .analysis-card span {
            color: var(--muted);
            line-height: 1.55;
            font-size: 13px;
        }

        .meal-list {
            display: grid;
            gap: 10px;
        }

        .meal {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 12px;
        }

        .meal strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .meal span {
            color: var(--muted);
            font-size: 12px;
        }

        .empty {
            color: var(--muted);
            font-size: 14px;
            padding: 8px 0;
        }

        @media (max-width: 1120px) {
            .layout,
            .main-grid {
                grid-template-columns: 1fr;
            }

            .target-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 620px) {
            .shell {
                grid-template-rows: auto 1fr;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                padding: 14px 16px;
            }

            .layout {
                width: min(100% - 22px, 680px);
                margin: 14px auto;
            }

            .target-grid,
            .nutrition-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const { createApp } = Vue;

        const PLAN_KEY = 'diet_platform_plan_v1';
        const MEALS_KEY = 'diet_platform_meals_v1';

        const API_CONFIG = {
            advice: '/api/advice',
            nutritionPredict: '/api/nutrition/predict',
            depthPreview: '/api/depth/preview',
            health: '/api/health'
        };

        const MODEL_DEFAULTS = {
            ckpt: 'trained_weights/omnifood8k/ckpt_best.pth',
            depthCkpt: 'pth/depth_anything_v2_vitl.pth',
            encoder: 'vitl',
            inputSize: 518,
            saveDepth: false
        };

        createApp({
            data() {
                return {
                    status: 'Ready',
                    mode: 'balanced',
                    profile: {
                        height_cm: '',
                        weight_kg: '',
                        age: ''
                    },
                    plan: null,
                    meals: [],
                    file: null,
                    previewUrl: '',
                    latestNutrition: null,
                    latestMeta: null,
                    loadingPlan: false,
                    loadingMeal: false
                };
            },
            computed: {
                hasProfile() {
                    return Boolean(
                        this.numberOrNull(this.profile.height_cm)
                        && this.numberOrNull(this.profile.weight_kg)
                        && this.numberOrNull(this.profile.age)
                    );
                },
                consumed() {
                    return this.meals.reduce((sum, meal) => {
                        const nutrition = meal.nutrition || {};
                        sum.calories += this.asNumber(nutrition.calories);
                        sum.fat += this.asNumber(nutrition.fat);
                        sum.carb += this.asNumber(nutrition.carb);
                        sum.protein += this.asNumber(nutrition.protein);
                        return sum;
                    }, { calories: 0, fat: 0, carb: 0, protein: 0 });
                },
                targetCards() {
                    const target = this.plan ? this.plan.targets : this.defaultTargets();
                    return [
                        { key: 'calories', label: '热量', unit: 'kcal', target: target.calories, used: this.consumed.calories },
                        { key: 'protein', label: '蛋白质', unit: 'g', target: target.protein, used: this.consumed.protein },
                        { key: 'fat', label: '脂肪', unit: 'g', target: target.fat, used: this.consumed.fat },
                        { key: 'carb', label: '碳水', unit: 'g', target: target.carb, used: this.consumed.carb }
                    ];
                },
                analysis() {
                    if (!this.plan) {
                        return [{
                            type: 'need',
                            title: '尚未生成总体建议',
                            text: '请先选择模式并填写身高、体重、年龄，生成本地膳食计划。'
                        }];
                    }

                    return this.targetCards.map((item) => {
                        const diff = Math.round((item.target - item.used) * 10) / 10;
                        const ratio = item.used / Math.max(item.target, 1);

                        if (diff > item.target * 0.12) {
                            return {
                                type: 'need',
                                title: item.label + '不足',
                                text: `今日还需约 ${diff}${item.unit}。${this.foodAdvice(item.key, diff)}`
                            };
                        }

                        if (diff < -item.target * 0.08) {
                            const over = Math.abs(diff);
                            return {
                                type: 'over',
                                title: item.label + '已超出',
                                text: `今日已超出约 ${over}${item.unit}。${this.exerciseAdvice(item.key, over)}`
                            };
                        }

                        return {
                            type: 'ok',
                            title: item.label + '接近目标',
                            text: `当前摄入约为目标的 ${Math.round(ratio * 100)}%，保持清淡搭配即可。`
                        };
                    });
                }
            },
            mounted() {
                this.loadLocalState();
            },
            methods: {
                setMode(nextMode) {
                    this.mode = nextMode;
                },
                numberOrNull(value) {
                    const parsed = Number(value);
                    return Number.isFinite(parsed) && value !== '' ? parsed : null;
                },
                asNumber(value) {
                    const parsed = Number(value);
                    return Number.isFinite(parsed) ? parsed : 0;
                },
                roundMetric(value) {
                    const parsed = Number(value);
                    if (!Number.isFinite(parsed)) return '--';
                    return Math.round(parsed * 10) / 10;
                },
                defaultTargets() {
                    return { calories: 1800, protein: 75, fat: 55, carb: 230 };
                },
                currentProfilePayload() {
                    return {
                        height_cm: this.numberOrNull(this.profile.height_cm),
                        weight_kg: this.numberOrNull(this.profile.weight_kg),
                        age: this.numberOrNull(this.profile.age)
                    };
                },
                async generatePlan() {
                    if (!this.hasProfile) {
                        this.status = '请先填写完整身体参数';
                        return;
                    }

                    this.loadingPlan = true;
                    this.status = 'Generating plan';

                    try {
                        const height = this.numberOrNull(this.profile.height_cm);
                        const weight = this.numberOrNull(this.profile.weight_kg);
                        const age = this.numberOrNull(this.profile.age);
                        const bmi = weight / Math.pow(height / 100, 2);
                        const bmr = 10 * weight + 6.25 * height - 5 * age + 5;
                        const baseCalories = Math.round(bmr * 1.35);
                        const calories = this.mode === 'weight_loss'
                            ? Math.max(1200, baseCalories - 400)
                            : Math.max(1500, baseCalories);

                        const targets = {
                            calories,
                            protein: Math.round(weight * (this.mode === 'weight_loss' ? 1.6 : 1.2)),
                            fat: Math.round((calories * (this.mode === 'weight_loss' ? 0.24 : 0.28)) / 9),
                            carb: Math.round((calories * (this.mode === 'weight_loss' ? 0.38 : 0.50)) / 4)
                        };

                        const planData = { height, weight, age, bmi, targets };
                        const localAdvice = this.buildPlanAdvice(planData);
                        const apiAdvice = await this.requestAdvice({
                            mode: this.mode === 'weight_loss' ? 'weight_loss' : 'normal',
                            nutrition: targets,
                            profile: { height_cm: height, weight_kg: weight, age, bmi }
                        });

                        this.plan = {
                            mode: this.mode,
                            profile: { height_cm: height, weight_kg: weight, age },
                            bmi: Math.round(bmi * 10) / 10,
                            targets,
                            advice: apiAdvice || localAdvice,
                            createdAt: new Date().toISOString()
                        };

                        localStorage.setItem(PLAN_KEY, JSON.stringify(this.plan));
                        this.status = 'Plan saved locally';
                    } finally {
                        this.loadingPlan = false;
                    }
                },
                buildPlanAdvice(data) {
                    const modeText = this.mode === 'weight_loss' ? '减脂模式' : '均衡模式';
                    const focus = this.mode === 'weight_loss'
                        ? '以温和热量缺口、高蛋白、低油低糖和规律运动为主。'
                        : '以主食、优质蛋白、蔬菜水果和适量脂肪均衡搭配为主。';
                    return [
                        `${modeText}总体建议`,
                        `BMI 约 ${Math.round(data.bmi * 10) / 10}。今日建议目标：热量 ${data.targets.calories} kcal，蛋白质 ${data.targets.protein} g，脂肪 ${data.targets.fat} g，碳水 ${data.targets.carb} g。`,
                        focus,
                        '每次上传食物图片后，系统会把识别出的营养值计入今日打卡，并判断缺口或超标。'
                    ].join('\n');
                },
                async requestAdvice(payload) {
                    try {
                        const response = await fetch(API_CONFIG.advice, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) {
                            throw new Error('advice api failed');
                        }
                        const result = await response.json();
                        return result.advice || '';
                    } catch (error) {
                        return '';
                    }
                },
                resetPlan() {
                    this.plan = null;
                    this.meals = [];
                    this.latestNutrition = null;
                    this.latestMeta = null;
                    localStorage.removeItem(PLAN_KEY);
                    localStorage.removeItem(MEALS_KEY);
                    this.status = 'Local plan cleared';
                },
                loadLocalState() {
                    const savedPlan = localStorage.getItem(PLAN_KEY);
                    const savedMeals = localStorage.getItem(MEALS_KEY);

                    if (savedPlan) {
                        this.plan = JSON.parse(savedPlan);
                        this.mode = this.plan.mode || 'balanced';
                        this.profile = {
                            height_cm: this.plan.profile.height_cm,
                            weight_kg: this.plan.profile.weight_kg,
                            age: this.plan.profile.age
                        };
                    }
                    if (savedMeals) {
                        this.meals = JSON.parse(savedMeals);
                        this.latestNutrition = this.meals.length ? this.meals[0].nutrition : null;
                        this.latestMeta = this.meals.length ? this.meals[0].meta : null;
                    }
                },
                chooseFile() {
                    this.$refs.fileInput.click();
                },
                onFileChange(event) {
                    const selected = event.target.files[0];
                    if (!selected) return;

                    this.file = selected;
                    if (this.previewUrl) {
                        URL.revokeObjectURL(this.previewUrl);
                    }
                    this.previewUrl = URL.createObjectURL(selected);
                    this.status = selected.name;
                },
                async addMeal() {
                    if (!this.file || this.loadingMeal) return;

                    this.loadingMeal = true;
                    this.status = 'Analyzing meal';

                    try {
                        const prediction = await this.requestNutritionPrediction(this.file);
                        const nutrition = prediction.nutrition;
                        this.latestNutrition = nutrition;
                        this.latestMeta = prediction.meta;

                        const advice = await this.requestAdvice({
                            mode: this.mode === 'weight_loss' ? 'weight_loss' : 'normal',
                            nutrition,
                            profile: {
                                ...this.currentProfilePayload(),
                                targets: this.plan ? this.plan.targets : this.defaultTargets(),
                                consumed_before_meal: this.consumed
                            }
                        });

                        this.meals.unshift({
                            id: Date.now(),
                            name: this.file.name,
                            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                            nutrition,
                            advice,
                            meta: prediction.meta
                        });
                        localStorage.setItem(MEALS_KEY, JSON.stringify(this.meals));
                        this.status = prediction.meta.source === 'mock'
                            ? 'Mock prediction saved'
                            : 'Meal checked in';
                    } catch (error) {
                        this.status = `分析失败：${error.message}`;
                    } finally {
                        this.loadingMeal = false;
                    }
                },
                async requestNutritionPrediction(file) {
                    const formData = new FormData();
                    formData.append('image', file);
                    formData.append('mode', this.mode === 'weight_loss' ? 'weight_loss' : 'normal');
                    formData.append('profile', JSON.stringify(this.currentProfilePayload()));
                    formData.append('options', JSON.stringify(MODEL_DEFAULTS));

                    try {
                        const response = await fetch(API_CONFIG.nutritionPredict, {
                            method: 'POST',
                            body: formData
                        });
                        if (!response.ok) {
                            throw new Error(`predict api ${response.status}`);
                        }
                        const result = await response.json();
                        return this.normalizePredictionResponse(result);
                    } catch (error) {
                        const fallback = await this.mockNutritionPrediction(file);
                        fallback.meta.error = error.message;
                        return fallback;
                    }
                },
                normalizePredictionResponse(result) {
                    const nutrition = result.nutrition || result.prediction || result;
                    return {
                        nutrition: {
                            calories: this.roundMetric(nutrition.calories ?? nutrition.energy ?? nutrition.kcal),
                            mass: this.roundMetric(nutrition.mass ?? nutrition.weight ?? nutrition.quality),
                            fat: this.roundMetric(nutrition.fat),
                            carb: this.roundMetric(nutrition.carb ?? nutrition.carbohydrate ?? nutrition.carbs),
                            protein: this.roundMetric(nutrition.protein)
                        },
                        meta: {
                            source: result.source || 'api',
                            model: result.model || 'OmniFood8K',
                            depthUrl: result.depth_url || result.depthUrl || '',
                            raw: result
                        }
                    };
                },
                async mockNutritionPrediction(file) {
                    await new Promise((resolve) => setTimeout(resolve, 380));
                    const name = file.name.toLowerCase();

                    if (name.includes('salad') || name.includes('vegetable')) {
                        return this.normalizePredictionResponse({
                            source: 'mock',
                            nutrition: { calories: 260, mass: 280, fat: 9, carb: 28, protein: 13 }
                        });
                    }
                    if (name.includes('chicken') || name.includes('fish')) {
                        return this.normalizePredictionResponse({
                            source: 'mock',
                            nutrition: { calories: 430, mass: 320, fat: 16, carb: 26, protein: 42 }
                        });
                    }
                    if (name.includes('cake') || name.includes('fried')) {
                        return this.normalizePredictionResponse({
                            source: 'mock',
                            nutrition: { calories: 760, mass: 260, fat: 38, carb: 82, protein: 16 }
                        });
                    }
                    return this.normalizePredictionResponse({
                        source: 'mock',
                        nutrition: { calories: 520, mass: 310, fat: 18, carb: 62, protein: 24 }
                    });
                },
                progressClass(card) {
                    const ratio = card.used / Math.max(card.target, 1);
                    if (ratio > 1.08) return 'over';
                    if (ratio < 0.75) return 'low';
                    return 'ok';
                },
                progressWidth(card) {
                    return Math.min(115, Math.round((card.used / Math.max(card.target, 1)) * 100)) + '%';
                },
                foodAdvice(key, diff) {
                    const rounded = Math.round(diff);
                    const map = {
                        calories: `可以补充一份燕麦、米饭或全麦面包，约补 ${rounded} kcal。`,
                        protein: `可选择鸡胸肉、鱼、鸡蛋、牛奶、豆腐，约补 ${rounded} g 蛋白质。`,
                        fat: `可少量补充坚果、牛油果或橄榄油，约补 ${rounded} g 脂肪。`,
                        carb: `可选择米饭、土豆、玉米或全麦面，约补 ${rounded} g 碳水。`
                    };
                    return map[key] || '';
                },
                exerciseAdvice(key, over) {
                    if (key === 'calories') {
                        return `可增加快走约 ${Math.ceil(over / 5)} 分钟，或慢跑约 ${Math.ceil(over / 9)} 分钟。`;
                    }
                    if (key === 'fat') {
                        return '下一餐减少油炸和高脂食物，并增加 30 分钟快走或骑行。';
                    }
                    if (key === 'carb') {
                        return '下一餐减少主食和甜食，优先选择蔬菜与优质蛋白。';
                    }
                    return '蛋白质略高通常问题不大，注意饮水和总热量控制。';
                },
                undoLastMeal() {
                    if (!this.meals.length) {
                        this.status = 'No meal record to undo';
                        return;
                    }

                    this.meals.shift();
                    this.latestNutrition = this.meals.length ? this.meals[0].nutrition : null;
                    this.latestMeta = this.meals.length ? this.meals[0].meta : null;
                    localStorage.setItem(MEALS_KEY, JSON.stringify(this.meals));
                    this.status = 'Latest meal record removed';
                }
            },
            template: `
                <main class="shell">
                    <header class="topbar">
                        <div class="brand">
                            <strong>膳食均衡管理平台</strong>
                            <span>生成个人计划、图片打卡、跟踪今日营养缺口与超标</span>
                        </div>
                        <div class="status">{{ status }}</div>
                    </header>

                    <section class="layout">
                        <aside class="stack">
                            <section class="panel">
                                <div class="panel-head">
                                    <h1 class="panel-title">个人计划</h1>
                                    <span class="panel-subtitle">本地存储</span>
                                </div>
                                <div class="panel-body">
                                    <div class="segmented">
                                        <button class="segment" :class="{ active: mode === 'balanced' }" type="button" @click="setMode('balanced')">均衡模式</button>
                                        <button class="segment" :class="{ active: mode === 'weight_loss' }" type="button" @click="setMode('weight_loss')">减脂模式</button>
                                    </div>
                                    <div class="form-grid">
                                        <div class="field">
                                            <label for="height">身高 cm</label>
                                            <input id="height" v-model="profile.height_cm" type="number" min="80" max="240" placeholder="170">
                                        </div>
                                        <div class="field">
                                            <label for="weight">体重 kg</label>
                                            <input id="weight" v-model="profile.weight_kg" type="number" min="25" max="250" placeholder="65">
                                        </div>
                                        <div class="field">
                                            <label for="age">年龄</label>
                                            <input id="age" v-model="profile.age" type="number" min="8" max="100" placeholder="25">
                                        </div>
                                        <button class="button primary full" type="button" :disabled="loadingPlan" @click="generatePlan">
                                            {{ loadingPlan ? '生成中...' : '生成总体建议并保存' }}
                                        </button>
                                        <button class="button warning full" type="button" @click="resetPlan">重置本地计划</button>
                                    </div>
                                </div>
                            </section>

                            <section class="panel">
                                <div class="panel-head">
                                    <h2 class="panel-title">总体建议</h2>
                                </div>
                                <div class="panel-body plan-box">
                                    <div class="plan-note" :class="{ muted: !plan }">
                                        {{ plan ? plan.advice : '请先填写身高、体重、年龄，并选择均衡模式或减脂模式。生成后建议会保存到浏览器 localStorage。' }}
                                    </div>
                                </div>
                            </section>
                        </aside>

                        <section class="dashboard">
                            <section class="panel">
                                <div class="panel-head">
                                    <h2 class="panel-title">今日目标与摄入</h2>
                                    <span class="panel-subtitle">{{ plan ? (plan.mode === 'weight_loss' ? '减脂模式' : '均衡模式') : '未生成计划' }}</span>
                                </div>
                                <div class="panel-body">
                                    <div class="target-grid">
                                        <div v-for="card in targetCards" :key="card.key" class="target">
                                            <span class="target-label">{{ card.label }}</span>
                                            <div>
                                                <span class="target-value">{{ Math.round(card.used) }}</span>
                                                <span class="target-unit">/ {{ card.target }} {{ card.unit }}</span>
                                            </div>
                                            <div class="progress">
                                                <div class="progress-fill" :class="progressClass(card)" :style="{ width: progressWidth(card) }"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <div class="main-grid">
                                <section class="panel">
                                    <div class="panel-head">
                                        <h2 class="panel-title">食物图片打卡</h2>
                                        <span class="panel-subtitle">{{ latestMeta ? latestMeta.source : 'API ready' }}</span>
                                    </div>
                                    <div class="panel-body">
                                        <div class="dropzone" :class="{ 'has-image': previewUrl }" @click="chooseFile">
                                            <img v-if="previewUrl" class="preview" :src="previewUrl" alt="Selected food image">
                                            <div v-else class="placeholder">
                                                <strong>选择今日食物图片</strong>
                                                上传后点击打卡，系统会调用预留接口并计入今日摄入
                                            </div>
                                            <input ref="fileInput" class="hidden-input" type="file" accept="image/*" @change="onFileChange">
                                        </div>
                                        <div class="toolbar">
                                            <button class="button" type="button" @click="chooseFile">选择图片</button>
                                            <button class="button primary" type="button" :disabled="!file || loadingMeal" @click="addMeal">
                                                {{ loadingMeal ? '分析中...' : '加入今日打卡' }}
                                            </button>
                                            <button class="button warning" type="button" :disabled="!meals.length" @click="undoLastMeal">撤回本次记录</button>
                                        </div>
                                        <div class="nutrition-grid">
                                            <div class="mini">
                                                <span>热量</span>
                                                <strong>{{ latestNutrition ? latestNutrition.calories : '--' }}</strong>
                                            </div>
                                            <div class="mini">
                                                <span>重量</span>
                                                <strong>{{ latestNutrition ? latestNutrition.mass : '--' }}</strong>
                                            </div>
                                            <div class="mini">
                                                <span>脂肪</span>
                                                <strong>{{ latestNutrition ? latestNutrition.fat : '--' }}</strong>
                                            </div>
                                            <div class="mini">
                                                <span>碳水</span>
                                                <strong>{{ latestNutrition ? latestNutrition.carb : '--' }}</strong>
                                            </div>
                                            <div class="mini">
                                                <span>蛋白质</span>
                                                <strong>{{ latestNutrition ? latestNutrition.protein : '--' }}</strong>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section class="panel">
                                    <div class="panel-head">
                                        <h2 class="panel-title">今日判断与建议</h2>
                                    </div>
                                    <div class="panel-body">
                                        <div class="analysis-list">
                                            <div v-for="item in analysis" :key="item.title" class="analysis-card" :class="item.type">
                                                <strong>{{ item.title }}</strong>
                                                <span>{{ item.text }}</span>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <section class="panel">
                                <div class="panel-head">
                                    <h2 class="panel-title">今日打卡记录</h2>
                                    <span class="panel-subtitle">{{ meals.length }} items</span>
                                </div>
                                <div class="panel-body">
                                    <div v-if="!meals.length" class="empty">今天还没有打卡记录。</div>
                                    <div v-else class="meal-list">
                                        <div v-for="meal in meals" :key="meal.id" class="meal">
                                            <div>
                                                <strong>{{ meal.name }}</strong>
                                                <span>{{ meal.time }} · {{ meal.nutrition.calories }} kcal · 蛋白质 {{ meal.nutrition.protein }}g · 脂肪 {{ meal.nutrition.fat }}g · 碳水 {{ meal.nutrition.carb }}g</span>
                                                <span v-if="meal.advice"> · {{ meal.advice }}</span>
                                            </div>
                                            <span>{{ meal.nutrition.mass }}g</span>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </section>
                    </section>
                </main>
            `
        }).mount('#app');
    </script>
</body>
</html>
